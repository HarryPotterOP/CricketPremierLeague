    <main class="min-h-screen flex flex-col items-center justify-center relative">
        <div id="timer-container" class="relative z-10 text-center">
            <div class="relative w-80 h-80 md:w-[450px] md:h-[450px] mb-12">
                <svg class="w-full h-full transform -rotate-90">
                    <circle cx="50%" cy="50%" r="45%" stroke="rgba(255,255,255,0.05)" stroke-width="10" fill="transparent" />
                    <circle class="timer-ring text-[#D4AF37]" cx="50%" cy="50%" r="45%" stroke="currentColor" stroke-width="10" fill="transparent" stroke-dasharray="1272" stroke-dashoffset="0" stroke-linecap="round" />
                </svg>
                <div class="absolute inset-0 flex flex-col items-center justify-center">
                    <h1 id="timer-display" class="text-7xl md:text-9xl font-light tracking-tighter mb-4">25:00</h1>
                    <div class="flex gap-6">
                        <button onclick="startTimer()" class="w-16 h-16 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center hover:bg-white/10 hover:border-[#D4AF37]/50 transition-all group">
                            <svg class="w-8 h-8 text-[#D4AF37]" fill="currentColor" viewBox="0 0 20 20"><path d="M4.5 3.5v13L16.5 10 4.5 3.5z"></path></svg>
                        </button>
                        <button onclick="pauseTimer()" class="w-16 h-16 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center hover:bg-white/10 transition-all">
                            <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20"><path d="M5.5 3.5h3v13h-3v-13zm6 0h3v13h-3v-13z"></path></svg>
                        </button>
                        <button onclick="resetTimer()" class="w-16 h-16 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center hover:bg-white/10 transition-all">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        </button>
                    </div>
                </div>
            </div>
            <div class="flex flex-wrap justify-center gap-4 ghost-hidden">
                <button onclick="setMode('pomodoro')" class="mode-btn active px-8 py-3 rounded-2xl bg-white/5 border border-white/10 hover:border-[#D4AF37]/50 transition-all font-semibold uppercase tracking-widest text-xs" data-mode="pomodoro">Pomodoro</button>
                <button onclick="setMode('short')" class="mode-btn px-8 py-3 rounded-2xl bg-white/5 border border-white/10 hover:border-[#A8E6CF]/50 transition-all font-semibold uppercase tracking-widest text-xs" data-mode="short">Short Break</button>
                <button onclick="setMode('long')" class="mode-btn px-8 py-3 rounded-2xl bg-white/5 border border-white/10 hover:border-[#A8E6CF]/50 transition-all font-semibold uppercase tracking-widest text-xs" data-mode="long">Long Break</button>
                <button onclick="toggleGhostMode()" class="px-8 py-3 rounded-2xl bg-[#D4AF37] text-[#0a0a0c] font-bold uppercase tracking-widest text-xs shadow-lg shadow-[#D4AF37]/20 hover:brightness-110 transition-all">Ghost Mode</button>
            </div>
        </div>
        <div class="fixed bottom-12 left-1/2 -translate-x-1/2 flex items-center gap-12 glass-card px-12 py-6 ghost-hidden">
            <button onclick="toggleSound('rain')" class="sound-btn flex flex-col items-center gap-3 text-white/30 hover:text-white transition-all group" data-sound="rain">
                <div class="w-12 h-12 rounded-xl bg-white/5 flex items-center justify-center group-hover:bg-white/10 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
                </div>
                <span class="text-[10px] uppercase font-bold tracking-[0.2em]">Rain</span>
            </button>
            <button onclick="toggleSound('lofi')" class="sound-btn flex flex-col items-center gap-3 text-white/30 hover:text-white transition-all group" data-sound="lofi">
                <div class="w-12 h-12 rounded-xl bg-white/5 flex items-center justify-center group-hover:bg-white/10 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path></svg>
                </div>
                <span class="text-[10px] uppercase font-bold tracking-[0.2em]">Lo-Fi</span>
            </button>
            <button onclick="toggleSound('library')" class="sound-btn flex flex-col items-center gap-3 text-white/30 hover:text-white transition-all group" data-sound="library">
                <div class="w-12 h-12 rounded-xl bg-white/5 flex items-center justify-center group-hover:bg-white/10 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 14v3m4-3v3m4-3v3M3 21h18M3 10h18M3 7l9-4 9 4M4 10h16v11H4V10z"></path></svg>
                </div>
                <span class="text-[10px] uppercase font-bold tracking-[0.2em]">Library</span>
            </button>
        </div>
