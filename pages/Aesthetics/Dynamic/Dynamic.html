<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <script src="../../../core/firebase-config.js"></script>
    <script src="../../../core/firebase-auth.js"></script>
    <script src="../../../core/session-manager.js"></script>
    <link rel="icon" type="image/png" href="../../../assets/images/Symbol.png">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        header {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            padding: 8px 40px !important;
            display: flex !important;
            justify-content: space-between !important;
            align-items: center !important;
            background: transparent !important;
            z-index: 1000 !important;
            box-shadow: none !important;
            height: 60px !important;
        }
        header figure {
            margin: 15px 25px 15px 40px !important;
            display: flex !important;
            align-items: center !important;
            gap: 15px !important;
        }
        header figure img {
            height: 55px !important;
            width: auto !important;
            object-fit: contain !important;
        }
        header nav ul {
            display: flex !important;
            list-style: none !important;
            gap: 25px !important;
            align-items: center !important;
        }
        header nav ul li a {
            font-family: Poppins, sans-serif !important;
            color: #FFB13D !important;
            text-decoration: none !important;
            font-size: 0.95em !important;
            font-weight: 600 !important;
            transition: all 0.3s ease !important;
            position: relative !important;
            padding: 10px 16px !important;
            border-radius: 6px !important;
            background: rgba(255, 177, 61, 0.1) !important;
        }
        header nav ul li a:hover {
            color: #fff !important;
        }
        body{
            background-color: #D2D2D2;
            background-image:
            repeating-linear-gradient(
                to right, transparent 0 100px,
                #25283b22 100px 101px
            ),
            repeating-linear-gradient(
                to bottom, transparent 0 100px,
                #25283b22 100px 101px
            );
            padding-top: 70px;
        }
        body::before{
            position: absolute;
            width: min(1400px, 90vw);
            top: 10%;
            left: 50%;
            height: 90%;
            transform: translateX(-50%);
            content: '';
            background-image: url(./images/bg.png);
            background-size: 100%;
            background-repeat: no-repeat;
            background-position: top center;
            pointer-events: none;
        }
    </style>
    <link rel="stylesheet" href="Dynamic.css">
</head>
<body>
    <header>
        <figure>
            <img src="images/logo.png" alt="Logo">
        </figure>
        <nav>
            <ul>
                <li><a href="../../home.html">Home</a></li>
            </ul>
        </nav>
    </header>
    <div class="banner">
        <div class="slider" style="--quantity: 10">
            <div class="item" style="--position: 1"><a href="../../home.html"><img src="images/dragon_1.jpg" alt=""></a></div>
            <div class="item" style="--position: 2"><a href="../../home.html"><img src="images/dragon_2.jpg" alt=""></a></div>
            <div class="item" style="--position: 3"><a href="../../home.html"><img src="images/dragon_3.jpg" alt=""></a></div>
            <div class="item" style="--position: 4"><a href="../../home.html"><img src="images/dragon_4.jpg" alt=""></a></div>
            <div class="item" style="--position: 5"><a href="../../home.html"><img src="images/dragon_5.jpg" alt=""></a></div>
            <div class="item" style="--position: 6"><a href="../../home.html"><img src="images/dragon_6.jpg" alt=""></a></div>
            <div class="item" style="--position: 7"><a href="../../home.html"><img src="images/dragon_7.jpg" alt=""></a></div>
            <div class="item" style="--position: 8"><a href="../../home.html"><img src="images/dragon_8.jpg" alt=""></a></div>
            <div class="item" style="--position: 9"><a href="../../home.html"><img src="images/dragon_9.jpg" alt=""></a></div>
            <div class="item" style="--position: 10"><a href="../../home.html"><img src="images/dragon_10.jpg" alt=""></a></div>
        </div>
        <div class="content">
            &nbsp;<h1 data-content="SHAZAM!">
                SHAZAM!
            </h1>
            <div class="author">
                <h2>Black Adam</h2>
                <p><b>Shazam OP</b></p>
                <p>
                    Life is Sad.
                </p>
            </div>
            <div class="model"></div>
        </div>
    </div>
<script>function toggleMobileMenu(){var nav=document.querySelector(".nav-links")||document.getElementById("nav-part2");if(nav)nav.classList.toggle("active");}</script>
</body>
</html>
