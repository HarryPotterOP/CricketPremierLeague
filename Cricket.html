<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Premier League</title>
    <link rel="stylesheet" href="Cricket.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <img src="Logo.png" alt="Cricket Premier League" class="logo">
                <h1>Cricket Premier League</h1>
            </div>
        </div>
    </header>

    <section class="best-player">
        <div class="container">
            <div class="player">
                <img src="ViratKohli.jpg" alt="King Kohli">
                <h2>King Kohli</h2>
                <p>Score: <span class="score">0</span></p>
                <p>Balls: <span class="balls">0</span></p>
                <p>Wickets: <span class="wickets">0</span></p>
                <p>Man Of The Match</p>
            </div>
        </div>
    </section>

    <section class="players">
        <div class="container">
            <table>
                <thead>
                    <tr>
                        <th>Team 1</th>
                        <th>Team 2</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Gaming Elite</td>
                        <td>Arise</td>
                    </tr>
                    <tr>
                        <td>Black Adam</td>
                        <td>Mathematics</td>
                    </tr>
                    <tr>
                        <td>Thala</td>
                        <td></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>

    <section class="match-stats">
        <div class="container">
            <h2>Everyday Match Stats</h2>
            <div class="stats">
                <p>Stat 1: <span class="stat-value">0</span></p>
                <p>Stat 2: <span class="stat-value">0</span></p>
                <!-- Add more stats as needed -->
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2024 Cricket Premier League. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
