<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Premier League </title>
    <link rel="stylesheet" href="Cricket.css">
</head>
<body>
    <div class="background-image"></div>
    
    <header>
        <div class="container">
            <img src="InShot_20240706_225628037.png" alt="StormDragons Logo" class="logo">
            <h1>Cricket Premier League </h1>
        </div>
    </header>

    <section class="players">
        <div class="container">
            <div class="player">
                <img src="InShot_20240706_134141903.jpg" alt="King Kohli">
                <h2>King Kohli</h2>
                <p>Score:2 <span class="score">-</span></p>
                <p>Balls:6 <span class="balls">-</span></p>
                <p>Wickets:1 <span class="wickets">-</span></p>
                <p>Latest Season 2024 Best Player</p>
            </div>
            <!-- Add more players similarly -->
        </div>
    </section>

    <section class="match-stats">
        <div class="container">
            <h2>Everyday Match Stats</h2>
            <div class="stats">
                <p>Stat 1: <span class="stat-value">-</span></p>
                <p>Stat 2: <span class="stat-value">-</span></p>
                <!-- Add more stats as needed -->
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2024 StormDragons Cricket Team. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
